# Memory budget for the Gradle JVM compiling Android and plugin code.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
# AndroidX is the modern Android support-library namespace used by Flutter plugins.
android.useAndroidX=true
# Permits older transitive libraries to be rewritten to AndroidX if encountered.
android.enableJetifier=true
